<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .container {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .game-area {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        canvas {
            background: #0a0a0f;
            border-radius: 8px;
            display: block;
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 250px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #00ff88;
        }

        .btn {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-start {
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }

        .btn-pause {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-pause:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-reset {
            background: linear-gradient(90deg, #ff6b6b, #ee5a5a);
            color: #fff;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
        }

        .controls {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls h3 {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls-list {
            list-style: none;
        }

        .controls-list li {
            padding: 8px 0;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .key {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .game-over-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            z-index: 100;
        }

        .game-over-overlay.show {
            display: block;
        }

        .game-over-title {
            font-size: 36px;
            margin-bottom: 10px;
            color: #ff6b6b;
        }

        .game-over-score {
            font-size: 18px;
            margin-bottom: 25px;
            color: rgba(255, 255, 255, 0.7);
        }

        .high-score {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
        }

        .speed-control {
            margin-top: 20px;
        }

        .speed-control label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            cursor: pointer;
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .speed-value {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
            text-align: right;
        }

        @media (max-width: 800px) {
            .container {
                flex-direction: column;
                gap: 20px;
            }

            .info-panel {
                min-width: auto;
                width: 100%;
                max-width: 320px;
            }
        }
    </style>
</head>
<body>
    <div class="game-over-overlay" id="gameOverOverlay">
        <h2 class="game-over-title">游戏结束</h2>
        <p class="game-over-score">最终得分: <span id="finalScore">0</span></p>
        <p class="high-score">最高分: <span id="highScore">0</span></p>
        <button class="btn btn-start" onclick="restartGame()">再来一局</button>
    </div>

    <div class="container">
        <div class="game-area">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>

        <div class="info-panel">
            <h1>贪吃蛇</h1>
            
            <div class="stat">
                <span class="stat-label">得分</span>
                <span class="stat-value" id="score">0</span>
            </div>

            <div class="stat">
                <span class="stat-label">长度</span>
                <span class="stat-value" id="length">3</span>
            </div>

            <div class="stat">
                <span class="stat-label">等级</span>
                <span class="stat-value" id="level">1</span>
            </div>

            <button class="btn btn-start" id="startBtn">开始游戏</button>
            <button class="btn btn-pause" id="pauseBtn" disabled>暂停</button>
            
            <div class="speed-control">
                <label for="speedRange">游戏速度</label>
                <input type="range" id="speedRange" min="50" max="200" value="100" step="10">
                <div class="speed-value" id="speedValue">1.0x</div>
            </div>

            <div class="controls">
                <h3>操作方式</h3>
                <ul class="controls-list">
                    <li><span class="key">↑</span> 向上移动</li>
                    <li><span class="key">↓</span> 向下移动</li>
                    <li><span class="key">←</span> 向左移动</li>
                    <li><span class="key">→</span> 向右移动</li>
                    <li><span class="key">空格</span> 暂停/继续</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 }
        ];
        
        let food = { x: 15, y: 10 };
        let dx = 1;
        let dy = 0;
        let score = 0;
        let gameLoop;
        let isRunning = false;
        let isPaused = false;
        let speed = 100;
        let highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');

        function draw() {
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            ctx.fillStyle = '#00ff88';
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    0,
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    gridSize / 2
                );
                if (index === 0) {
                    gradient.addColorStop(0, '#ffffff');
                    gradient.addColorStop(1, '#00ff88');
                } else {
                    const opacity = 1 - (index / snake.length) * 0.5;
                    gradient.addColorStop(0, `rgba(0, 255, 136, ${opacity})`);
                    gradient.addColorStop(1, `rgba(0, 212, 255, ${opacity * 0.8})`);
                }
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 2,
                    segment.y * gridSize + 2,
                    gridSize - 4,
                    gridSize - 4,
                    4
                );
                ctx.fill();
            });
            
            const foodGradient = ctx.createRadialGradient(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                0,
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2
            );
            foodGradient.addColorStop(0, '#ff6b6b');
            foodGradient.addColorStop(1, '#ee5a5a');
            ctx.fillStyle = foodGradient;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 3,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('●', food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2 + 4);
        }

        function move() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            if (head.x < 0) head.x = tileCount - 1;
            else if (head.x >= tileCount) head.x = 0;
            if (head.y < 0) head.y = tileCount - 1;
            else if (head.y >= tileCount) head.y = 0;
            
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScore();
                spawnFood();
                updateLevel();
            } else {
                snake.pop();
            }
            
            updateLength();
        }

        function spawnFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            food = newFood;
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore.toString());
            }
        }

        function updateLength() {
            document.getElementById('length').textContent = snake.length;
        }

        function updateLevel() {
            const level = Math.floor(score / 50) + 1;
            document.getElementById('level').textContent = level;
            const newSpeed = Math.max(50, 150 - level * 10);
            setSpeed(newSpeed);
        }

        function setSpeed(newSpeed) {
            speed = newSpeed;
            if (isRunning && !isPaused) {
                clearInterval(gameLoop);
                gameLoop = setInterval(() => {
                    move();
                    draw();
                }, speed);
            }
        }

        function gameLoopFn() {
            move();
            draw();
        }

        function startGame() {
            if (isRunning && !isPaused) return;
            
            if (isPaused) {
                isPaused = false;
                document.getElementById('pauseBtn').textContent = '暂停';
                document.getElementById('startBtn').textContent = '开始游戏';
                gameLoop = setInterval(gameLoopFn, speed);
                return;
            }
            
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            score = 0;
            isPaused = false;
            
            spawnFood();
            updateScore();
            updateLength();
            document.getElementById('level').textContent = '1';
            
            isRunning = true;
            document.getElementById('startBtn').textContent = '重新开始';
            document.getElementById('pauseBtn').disabled = false;
            document.getElementById('gameOverOverlay').classList.remove('show');
            
            gameLoop = setInterval(gameLoopFn, speed);
        }

        function pauseGame() {
            if (!isRunning || isPaused) return;
            
            isPaused = true;
            clearInterval(gameLoop);
            document.getElementById('pauseBtn').textContent = '继续';
            document.getElementById('startBtn').textContent = '开始游戏';
        }

        function gameOver() {
            clearInterval(gameLoop);
            isRunning = false;
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('gameOverOverlay').classList.add('show');
            document.getElementById('pauseBtn').disabled = true;
        }

        function restartGame() {
            document.getElementById('gameOverOverlay').classList.remove('show');
            startGame();
        }

        function handleKeyDown(e) {
            if (!isRunning || isPaused) {
                if (e.code === 'Space') {
                    e.preventDefault();
                    startGame();
                }
                return;
            }
            
            switch (e.code) {
                case 'ArrowUp':
                case 'KeyW':
                    if (dy !== 1) {
                        dx = 0;
                        dy = -1;
                    }
                    break;
                case 'ArrowDown':
                case 'KeyS':
                    if (dy !== -1) {
                        dx = 0;
                        dy = 1;
                    }
                    break;
                case 'ArrowLeft':
                case 'KeyA':
                    if (dx !== 1) {
                        dx = -1;
                        dy = 0;
                    }
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    if (dx !== -1) {
                        dx = 1;
                        dy = 0;
                    }
                    break;
                case 'Space':
                    e.preventDefault();
                    pauseGame();
                    break;
            }
        }

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('pauseBtn').addEventListener('click', pauseGame);
        
        document.getElementById('speedRange').addEventListener('input', (e) => {
            const value = parseInt(e.target.value);
            setSpeed(value);
            document.getElementById('speedValue').textContent = (value / 100).toFixed(1) + 'x';
        });
        
        document.getElementById('speedValue').textContent = (speed / 100).toFixed(1) + 'x';
        
        document.getElementById('highScore').textContent = highScore;
        
        document.addEventListener('keydown', handleKeyDown);
        
        draw();
    </script>
</body>
</html>
