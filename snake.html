<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnakePixel - 贪吃蛇</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            position: relative;
        }

        .game-area {
            flex: 0 0 auto;
        }

        .info-panel {
            flex: 0 0 auto;
        }

        .game-stats {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.15), rgba(0, 212, 255, 0.1));
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-icon {
            font-size: 20px;
        }

        .stat-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .stat-name {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-num {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-area {
            position: relative;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
            border-radius: 20px;
            padding: 15px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        canvas {
            background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
            border-radius: 12px;
            display: block;
            box-shadow: 
                inset 0 2px 10px rgba(0, 0, 0, 0.5),
                0 0 30px rgba(0, 255, 136, 0.05);
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 220px;
        }

        h1 {
            font-size: 22px;
            margin: 0 0 15px 0;
            text-align: center;
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #00ff88;
        }

        .btn {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-start {
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }

        .btn-pause {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-pause:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-reset {
            background: linear-gradient(90deg, #ff6b6b, #ee5a5a);
            color: #fff;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
        }

        .controls, .food-guide {
            margin-top: 0;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .food-guide {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px 15px;
        }

        .food-guide h3 {
            grid-column: 1 / -1;
        }

        .food-item {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .controls h3, .food-guide h3 {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .controls-list li {
            padding: 4px 0;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .key {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .game-over-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            z-index: 100;
        }

        .game-over-overlay.show {
            display: block;
        }

        .game-over-title {
            font-size: 36px;
            margin-bottom: 10px;
            color: #ff6b6b;
        }

        .game-over-score {
            font-size: 18px;
            margin-bottom: 25px;
            color: rgba(255, 255, 255, 0.7);
        }

        .high-score {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
        }

        .speed-control {
            margin-top: 20px;
        }

        .speed-control label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            cursor: pointer;
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .speed-value {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
            text-align: right;
        }

        @media (max-width: 800px) {
            .container {
                flex-direction: column;
                gap: 20px;
            }

            .info-panel {
                min-width: auto;
                width: 100%;
                max-width: 320px;
            }
        }

        .game-mode-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .mode-btn {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            color: #1a1a2e;
            border-color: transparent;
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .mode-btn.active:hover {
            background: linear-gradient(90deg, #00ff88, #00d4ff);
        }

        .time-display {
            text-align: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-top: 10px;
        }

        .time-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }

        .time-value {
            font-size: 24px;
            font-weight: 600;
            color: #00d4ff;
        }

        .score-popup {
            position: absolute;
            font-size: 18px;
            font-weight: bold;
            color: #00ff88;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 10;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-30px);
            }
        }

        .effect-notification {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            text-align: center;
            pointer-events: none;
            animation: effectPop 1.5s ease-out forwards;
            z-index: 20;
            white-space: nowrap;
        }

        @keyframes effectPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            15% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);
            }
            25% {
                transform: translate(-50%, -50%) scale(1);
            }
            80% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .mode-intro-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 17, 23, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            border-radius: 12px;
        }

        .mode-intro-overlay.hidden {
            display: none;
        }

        .mode-intro-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .mode-intro-title {
            font-size: 28px;
            font-weight: 700;
            color: #00ff88;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .mode-intro-rules {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            line-height: 1.8;
            margin-bottom: 30px;
            max-width: 400px;
            padding: 0 20px;
        }

        .mode-intro-rules li {
            margin-bottom: 8px;
            list-style: none;
        }

        .mode-intro-btn {
            padding: 14px 50px;
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            color: #1a1a2e;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .mode-intro-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        }

        .pause-overlay {
            position: absolute;
            top: 75px;
            left: 15px;
            width: 560px;
            height: 560px;
            background: rgba(13, 17, 23, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 25;
            border-radius: 12px;
        }

        .pause-overlay.hidden {
            display: none;
        }

        .pause-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .pause-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .pause-title {
            font-size: 28px;
            font-weight: 700;
            color: #00ff88;
            margin-bottom: 25px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        /* ===== 新增炫酷效果 ===== */

        /* 全局字体应用 */
        h1, .game-over-title, .pause-title, .mode-intro-title,
        .stat-num, .stat-value, .time-value, #topScore, #topLength, #topLevel {
            font-family: 'Orbitron', monospace !important;
        }

        .mode-btn, .btn, .effect-notification, .countdown-number,
        .score-popup, .food-item, .controls-list li, .stat-name {
            font-family: 'Orbitron', sans-serif;
        }

        /* 全屏粒子背景 Canvas */
        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -2;
            pointer-events: none;
            opacity: 0.6;
        }

        /* 新背景光晕层 */
        .bg-glow {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -3;
            background:
                radial-gradient(ellipse 600px 400px at 20% 50%, rgba(0, 255, 136, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse 500px 500px at 80% 30%, rgba(0, 212, 255, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 400px 600px at 50% 80%, rgba(180, 77, 255, 0.05) 0%, transparent 70%);
            animation: glowDrift 12s ease-in-out infinite alternate;
        }

        @keyframes glowDrift {
            0%   { transform: translate(0, 0) scale(1); }
            50%  { transform: translate(20px, -10px) scale(1.05); }
            100% { transform: translate(-10px, 15px) scale(0.95); }
        }

        /* 霓虹流光边框 — 游戏区域 */
        .game-area {
            position: relative;
            overflow: hidden;
        }

        .game-area::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(
                from 0deg,
                #00ff88, #00d4ff, #ff2d95, #b44dff,
                #ffd700, #00ff88
            );
            animation: spinBorder 6s linear infinite;
            z-index: -1;
        }

        .game-area::after {
            content: '';
            position: absolute;
            inset: 2px;
            border-radius: 18px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(20px);
            z-index: -1;
        }

        @keyframes spinBorder {
            100% { transform: rotate(360deg); }
        }

        /* 覆盖掉原来 game-area 的背景和 border，由 ::after 接管 */
        .game-area {
            background: transparent !important;
            border: none !important;
            backdrop-filter: none !important;
        }

        /* Canvas 内部加光晕 */
        canvas {
            box-shadow:
                inset 0 2px 10px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(0, 255, 136, 0.08),
                0 0 80px rgba(0, 212, 255, 0.04) !important;
        }

        /* 屏幕震动 */
        @keyframes shake {
            0%, 100% { transform: translate(0); }
            10% { transform: translate(-5px, 3px); }
            20% { transform: translate(3px, -5px); }
            30% { transform: translate(-4px, 5px); }
            40% { transform: translate(5px, -3px); }
            50% { transform: translate(-5px, -4px); }
            60% { transform: translate(3px, 5px); }
            70% { transform: translate(-4px, -5px); }
            80% { transform: translate(5px, 3px); }
            90% { transform: translate(-5px, 4px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }

        /* 倒数动画 */
        .countdown-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 60;
            pointer-events: none;
        }
        .countdown-overlay.hidden {
            display: none;
        }
        .countdown-number {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 140px;
            color: #fff;
            text-shadow:
                0 0 40px rgba(0, 255, 136, 0.9),
                0 0 80px rgba(0, 255, 136, 0.5),
                0 0 120px rgba(0, 255, 136, 0.3);
            animation: countPop 0.7s ease-out forwards;
            opacity: 0;
        }
        @keyframes countPop {
            0%   { opacity: 0; transform: scale(3); filter: blur(8px); }
            25%  { opacity: 1; transform: scale(1); filter: blur(0); }
            75%  { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(0.6); filter: blur(4px); }
        }
        /* GO! 特殊颜色 */
        .countdown-go {
            color: #ffd700;
            text-shadow:
                0 0 40px rgba(255, 215, 0, 0.9),
                0 0 80px rgba(255, 215, 0, 0.5),
                0 0 120px rgba(255, 215, 0, 0.3);
        }

        /* 按钮涟漪 */
        .btn {
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            transform: scale(0);
            animation: rippleAnim 0.6s ease-out forwards;
            pointer-events: none;
        }
        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }

        /* 食物说明 + 控制面板字体优化 */
        .food-guide h3, .controls h3 {
            letter-spacing: 2px;
        }

        /* 弹窗增强光晕 */
        .game-over-overlay {
            border: 1px solid rgba(255, 107, 107, 0.3);
            box-shadow:
                0 0 40px rgba(255, 107, 107, 0.15),
                inset 0 0 40px rgba(255, 107, 107, 0.05);
        }

        .game-over-title {
            font-size: 36px !important;
            font-weight: 900 !important;
            letter-spacing: 4px;
        }

        /* mode intro 面板光晕加强 */
        .mode-intro-title {
            text-shadow:
                0 0 30px rgba(0, 255, 136, 0.6),
                0 0 60px rgba(0, 255, 136, 0.3) !important;
        }

        /* 暂停面板增强 */
        .pause-content .pause-title {
            text-shadow:
                0 0 30px rgba(0, 255, 136, 0.6),
                0 0 60px rgba(0, 255, 136, 0.3) !important;
        }

        /* 移动端适配 */
        @media (max-width: 800px) {
            .game-area::before { display: none; }
            .game-area { background: linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)) !important; }
            .game-area::after { display: none; }
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="game-area">
            <div class="game-over-overlay" id="gameOverOverlay">
                <h2 class="game-over-title">游戏结束</h2>
                <p class="game-over-score">最终得分: <span id="finalScore">0</span></p>
                <p class="high-score">最高分: <span id="highScore">0</span></p>
                <p class="high-score" id="livesDisplay" style="font-size:16px; margin-bottom:15px;">❤️ × <span id="livesCount">3</span></p>
                <button class="btn btn-start" id="reviveBtn" onclick="reviveGame()">复活</button>
                <button class="btn btn-reset" onclick="restartGame()">重新开始</button>
            </div>
            <div class="game-stats">
                <div class="stat-item">
                    <span class="stat-icon">🎯</span>
                    <span class="stat-info">
                        <span class="stat-name">得分</span>
                        <span class="stat-num" id="topScore">0</span>
                    </span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">📏</span>
                    <span class="stat-info">
                        <span class="stat-name">长度</span>
                        <span class="stat-num" id="topLength">3</span>
                    </span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">⭐</span>
                    <span class="stat-info">
                        <span class="stat-name">等级</span>
                        <span class="stat-num" id="topLevel">1</span>
                    </span>
                </div>
            </div>
            <canvas id="gameCanvas" width="560" height="560"></canvas>
            <div class="mode-intro-overlay" id="modeIntroOverlay">
                <div class="mode-intro-icon" id="modeIntroIcon">🎮</div>
                <div class="mode-intro-title" id="modeIntroTitle">经典模式</div>
                <ul class="mode-intro-rules" id="modeIntroRules">
                    <li>🎯 吃食物得分</li>
                    <li>👻 穿墙不死</li>
                    <li>💀 碰到自己身体游戏结束</li>
                </ul>
                <button class="mode-intro-btn" id="modeIntroBtn">开始游戏</button>
            </div>
            <div class="pause-overlay hidden" id="pauseOverlay">
                <div class="pause-content">
                    <div class="pause-icon">⏸️</div>
                    <div class="pause-title">游戏暂停</div>
                    <button class="mode-intro-btn" id="resumeBtn">继续游戏</button>
                </div>
            </div>
            <div class="countdown-overlay hidden" id="countdownOverlay">
                <div class="countdown-number" id="countdownText">3</div>
            </div>
            <div style="text-align: center; margin-top: 10px; font-size: 13px; color: rgba(255,255,255,0.35);">
                <span>v1.0</span>
                <span style="margin: 0 8px;">|</span>
                <a href="https://github.com/MindToCoding/SnakePixel" target="_blank" style="color: rgba(255,255,255,0.35); text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color='#00ff88'" onmouseout="this.style.color='rgba(255,255,255,0.4)'">GitHub</a>
            </div>
        </div>

        <div class="info-panel">
            <h1>贪吃蛇</h1>
            
            <div class="game-mode-selector">
                <button class="mode-btn active" data-mode="classic">经典</button>
                <button class="mode-btn" data-mode="timed">限时</button>
                <button class="mode-btn" data-mode="survival">生存</button>
            </div>
            
            <div class="time-display" id="timeDisplay" style="display: none;">
                <div class="time-label">剩余时间</div>
                <div class="time-value" id="timeValue">60</div>
            </div>

            <div class="speed-control">
                <label for="speedRange">游戏速度</label>
                <input type="range" id="speedRange" min="50" max="200" value="100" step="10">
                <div class="speed-value" id="speedValue">1.0x</div>
            </div>

            <div class="food-guide">
                <h3>道具</h3>
                <div class="food-item"><span style="color:#ff6b6b">●</span> 普通10分</div>
                <div class="food-item"><span style="color:#ffd700">⚡</span> 加速</div>
                <div class="food-item"><span style="color:#87ceeb">❄</span> 减速</div>
                <div class="food-item"><span style="color:#ff69b4">×2</span> 双倍分</div>
                <div class="food-item"><span style="color:#d3d3d3">👻</span> 幽灵</div>
                <div class="food-item"><span style="color:#90ee90">🛡</span> 护盾</div>
                <div class="food-item"><span style="color:#ffd700">★</span> 金色30分</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 }
        ];
        
        let foods = [];
        let dx = 1;
        let dy = 0;
        let score = 0;
        
        const stars = [];
        for (let i = 0; i < 30; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.5 + 0.5,
                opacity: Math.random() * 0.5 + 0.2,
                twinkle: Math.random() * Math.PI * 2
            });
        }
        let particles = [];

        class Particle {
            constructor(x, y, color, velocity, size, life, type = 'circle') {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = velocity.x;
                this.vy = velocity.y;
                this.size = size;
                this.life = life;
                this.maxLife = life;
                this.type = type;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life--;
                this.rotation += this.rotationSpeed;
            }

            draw(ctx) {
                const alpha = this.life / this.maxLife;
                const currentSize = this.size * (0.5 + 0.5 * alpha);

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                if (this.type === 'circle') {
                    ctx.fillStyle = this.color;
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = currentSize * 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, currentSize, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 'star') {
                    ctx.fillStyle = this.color;
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = currentSize * 3;
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                        const ex = Math.cos(angle) * currentSize;
                        const ey = Math.sin(angle) * currentSize;
                        if (i === 0) ctx.moveTo(ex, ey);
                        else ctx.lineTo(ex, ey);
                    }
                    ctx.closePath();
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        function createFoodParticles(gx, gy, color1, color2) {
            const count = 10 + Math.floor(Math.random() * 8);
            const cx = gx * gridSize + gridSize / 2;
            const cy = gy * gridSize + gridSize / 2;
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.5;
                const speed = 1.5 + Math.random() * 2.5;
                const color = Math.random() > 0.5 ? color1 : color2;
                const size = 2 + Math.random() * 3;
                const life = 25 + Math.random() * 20;
                particles.push(new Particle(
                    cx, cy, color,
                    { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed },
                    size, life,
                    Math.random() > 0.5 ? 'circle' : 'star'
                ));
            }
        }

        function createGameOverParticles() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const colors = ['#ff6b6b', '#ee5a5a', '#ffd700', '#ff69b4', '#00ff88', '#00d4ff'];
            for (let i = 0; i < 60; i++) {
                const angle = (Math.PI * 2 / 60) * i + (Math.random() - 0.5) * 0.3;
                const speed = 2 + Math.random() * 5;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const size = 2 + Math.random() * 5;
                const life = 50 + Math.random() * 40;
                particles.push(new Particle(
                    cx, cy, color,
                    { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed },
                    size, life,
                    Math.random() > 0.3 ? 'circle' : 'star'
                ));
            }
        }

        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw(ctx);
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        let gameLoop;
        let isRunning = false;
        let isPaused = false;
        let baseSpeed = 100;
        let currentSpeed = 100;
        let highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
        let currentMode = 'classic';
        let timeRemaining = 60;
        let timeLoop;
        let lives = 3;
        
        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playSound(frequency, duration, type = 'sine', volume = 0.1) {
            if (!audioContext) return;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }
        
        function playEatSound() {
            playSound(880, 0.1, 'sine', 0.08);
            setTimeout(() => playSound(1320, 0.1, 'sine', 0.05), 50);
        }
        
        function playGameOverSound() {
            playSound(200, 0.5, 'triangle', 0.1);
            setTimeout(() => playSound(150, 0.5, 'triangle', 0.1), 250);
            setTimeout(() => playSound(100, 0.7, 'triangle', 0.1), 500);
        }
        
        function playStartSound() {
            playSound(523.25, 0.15, 'sine', 0.08);
            setTimeout(() => playSound(659.25, 0.15, 'sine', 0.08), 150);
            setTimeout(() => playSound(783.99, 0.2, 'sine', 0.08), 300);
        }
        
        function showScorePopup(x, y, points) {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = `+${points}`;
            popup.style.left = `${x}px`;
            popup.style.top = `${y}px`;
            document.querySelector('.game-area').appendChild(popup);
            
            setTimeout(() => popup.remove(), 800);
        }
        
        const foodTypes = [
            { type: 'normal', emoji: '●', color1: '#ff6b6b', color2: '#ee5a5a', points: 10, probability: 0.35, effect: null },
            { type: 'speed', emoji: '⚡', color1: '#ffd700', color2: '#ff8c00', points: 15, probability: 0.12, effect: 'speed' },
            { type: 'slow', emoji: '❄', color1: '#87ceeb', color2: '#4169e1', points: 15, probability: 0.12, effect: 'slow' },
            { type: 'double', emoji: '×2', color1: '#ff69b4', color2: '#ff1493', points: 20, probability: 0.1, effect: 'double' },
            { type: 'ghost', emoji: '👻', color1: '#d3d3d3', color2: '#a9a9a9', points: 25, probability: 0.1, effect: 'ghost' },
            { type: 'shield', emoji: '🛡', color1: '#90ee90', color2: '#228b22', points: 20, probability: 0.11, effect: 'shield' },
            { type: 'gold', emoji: '★', color1: '#ffd700', color2: '#ffaa00', points: 30, probability: 0.1, effect: null }
        ];
        
        let activeEffects = {
            speed: { active: false, duration: 0, maxDuration: 5000 },
            slow: { active: false, duration: 0, maxDuration: 5000 },
            double: { active: false, duration: 0, maxDuration: 8000 },
            ghost: { active: false, duration: 0, maxDuration: 6000 },
            shield: { active: false, duration: 0, maxDuration: 4000 },
            burst: { active: false, duration: 0, maxDuration: 1000 }
        };

        let keyPressTimestamps = [];

        // ===== 新增炫酷特效变量 =====
        let snakeTrail = [];          // 蛇拖尾轨迹
        let isShaking = false;        // 屏幕震动
        let scoreAnimation = null;    // 分数动画
        let bgParticles = [];         // 全屏背景粒子
        const BG_PARTICLE_COUNT = 80;

        function draw() {
            const bgGradient = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 0,
                canvas.width / 2, canvas.height / 2, canvas.width / 2
            );
            bgGradient.addColorStop(0, '#1a1a2e');
            bgGradient.addColorStop(0.5, '#16213e');
            bgGradient.addColorStop(1, '#0f3460');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            stars.forEach(star => {
                star.twinkle += 0.05;
                const twinkleOpacity = star.opacity + Math.sin(star.twinkle) * 0.3;
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0.1, Math.min(0.8, twinkleOpacity))})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            
            const gridGradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gridGradient.addColorStop(0, 'rgba(0, 255, 136, 0.03)');
            gridGradient.addColorStop(0.5, 'rgba(0, 212, 255, 0.05)');
            gridGradient.addColorStop(1, 'rgba(0, 255, 136, 0.03)');
            ctx.strokeStyle = gridGradient;
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            ctx.shadowColor = 'rgba(0, 255, 136, 0.3)';
            ctx.shadowBlur = 10;
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
            ctx.lineWidth = 2;
            ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);
            ctx.shadowBlur = 0;

            // === 蛇拖尾光效 ===
            const trailLen = snakeTrail.length;
            snakeTrail.forEach((pos, i) => {
                const alpha = (i / trailLen) * 0.35;
                const size = (i / trailLen) * (gridSize * 0.6);
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#00ff88';
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(
                    pos.x * gridSize + gridSize / 2,
                    pos.y * gridSize + gridSize / 2,
                    size, 0, Math.PI * 2
                );
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    0,
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    gridSize / 2
                );
                
                if (index === 0) {
                    ctx.shadowColor = '#00ff88';
                    ctx.shadowBlur = 15;
                    gradient.addColorStop(0, '#ffffff');
                    gradient.addColorStop(0.3, '#6affb8');
                    gradient.addColorStop(1, '#00ff88');
                } else {
                    const opacity = 1 - (index / snake.length) * 0.4;
                    ctx.shadowColor = 'rgba(0, 212, 255, 0.5)';
                    ctx.shadowBlur = 8;
                    gradient.addColorStop(0, `rgba(106, 255, 184, ${opacity})`);
                    gradient.addColorStop(1, `rgba(0, 212, 255, ${opacity * 0.9})`);
                }
                ctx.fillStyle = gradient;
                ctx.fillRect(
                    segment.x * gridSize + 2,
                    segment.y * gridSize + 2,
                    gridSize - 4,
                    gridSize - 4
                );

                // === 蛇头眼睛 ===
                if (index === 0) {
                    const cx = segment.x * gridSize + gridSize / 2;
                    const cy = segment.y * gridSize + gridSize / 2;
                    const eyeOffset = 4;
                    const eyeSize = 3;
                    let ex1, ey1, ex2, ey2;
                    if (dx === 1) { // 右
                        ex1 = cx + 2; ey1 = cy - eyeOffset;
                        ex2 = cx + 2; ey2 = cy + eyeOffset;
                    } else if (dx === -1) { // 左
                        ex1 = cx - 2; ey1 = cy - eyeOffset;
                        ex2 = cx - 2; ey2 = cy + eyeOffset;
                    } else if (dy === -1) { // 上
                        ex1 = cx - eyeOffset; ey1 = cy - 2;
                        ex2 = cx + eyeOffset; ey2 = cy - 2;
                    } else { // 下
                        ex1 = cx - eyeOffset; ey1 = cy + 2;
                        ex2 = cx + eyeOffset; ey2 = cy + 2;
                    }
                    ctx.shadowBlur = 0;
                    // 眼白
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(ex1, ey1, eyeSize, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(ex2, ey2, eyeSize, 0, Math.PI * 2); ctx.fill();
                    // 瞳孔
                    ctx.fillStyle = '#111';
                    ctx.beginPath(); ctx.arc(ex1, ey1, 1.5, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(ex2, ey2, 1.5, 0, Math.PI * 2); ctx.fill();
                }
            });
            ctx.shadowBlur = 0;
            
            foods.forEach(foodItem => {
                const pulse = Math.sin(Date.now() / 300 + foodItem.x + foodItem.y) * 0.15 + 1;
                const r = (gridSize / 2 - 3) * pulse;

                const foodGradient = ctx.createRadialGradient(
                    foodItem.x * gridSize + gridSize / 2,
                    foodItem.y * gridSize + gridSize / 2,
                    0,
                    foodItem.x * gridSize + gridSize / 2,
                    foodItem.y * gridSize + gridSize / 2,
                    gridSize / 2 * pulse
                );
                foodGradient.addColorStop(0, foodItem.color1);
                foodGradient.addColorStop(0.5, foodItem.color1);
                foodGradient.addColorStop(1, foodItem.color2);

                ctx.shadowColor = foodItem.color1;
                ctx.shadowBlur = 15 + Math.sin(Date.now() / 300) * 5;
                ctx.fillStyle = foodGradient;
                
                if (foodItem.type === 'gold') {
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                        const x = foodItem.x * gridSize + gridSize / 2 + Math.cos(angle) * r;
                        const y = foodItem.y * gridSize + gridSize / 2 + Math.sin(angle) * r;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.arc(
                        foodItem.x * gridSize + gridSize / 2,
                        foodItem.y * gridSize + gridSize / 2,
                        r,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();
                }
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(foodItem.emoji, foodItem.x * gridSize + gridSize / 2, foodItem.y * gridSize + gridSize / 2 + 4);
            });
            ctx.shadowBlur = 0;
            
            drawEffectsBar();
            drawParticles();
        }
        
        function drawEffectsBar() {
            let x = 10;
            const y = canvas.height - 25;
            const barHeight = 18;
            
            for (const [effectName, effect] of Object.entries(activeEffects)) {
                if (effect.active) {
                    const width = (effect.duration / effect.maxDuration) * 80;
                    const colors = {
                        speed: '#ffd700',
                        slow: '#87ceeb',
                        double: '#ff69b4',
                        ghost: '#d3d3d3',
                        shield: '#90ee90',
                        burst: '#ff4500'
                    };
                    ctx.fillStyle = colors[effectName] || '#ffffff';
                    ctx.globalAlpha = 0.3;
                    ctx.fillRect(x, y, 80, barHeight);
                    ctx.globalAlpha = 1;
                    ctx.fillRect(x, y, width, barHeight);
                    
                    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                    ctx.strokeRect(x, y, 80, barHeight);
                    
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 10px Arial';
                    ctx.textAlign = 'center';
                    const emojis = { speed: '⚡', slow: '❄', double: '×2', ghost: '👻', shield: '🛡', burst: '🔥' };
                    ctx.fillText(emojis[effectName], x + 40, y + 14);
                    x += 90;
                }
            }
            ctx.globalAlpha = 1;
        }

        function move() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            if (head.x < 0) head.x = tileCount - 1;
            else if (head.x >= tileCount) head.x = 0;
            if (head.y < 0) head.y = tileCount - 1;
            else if (head.y >= tileCount) head.y = 0;
            
            if (!activeEffects.ghost.active && snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                if (activeEffects.shield.active) {
                    activeEffects.shield.active = false;
                } else {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);

            // 更新蛇拖尾轨迹
            snakeTrail.push({ x: head.x, y: head.y });
            if (snakeTrail.length > 8) snakeTrail.shift();
            
            const eatenIndex = foods.findIndex(f => f.x === head.x && f.y === head.y);
            if (eatenIndex !== -1) {
                const eatenFood = foods[eatenIndex];
                let points = eatenFood.points;
                if (activeEffects.double.active) points *= 2;
                score += points;
                updateScore();
                
                playEatSound();
                createFoodParticles(head.x, head.y, eatenFood.color1, eatenFood.color2);
                showScorePopup(
                    head.x * gridSize + gridSize / 2,
                    head.y * gridSize,
                    points
                );
                
                if (eatenFood.effect) {
                    applyEffect(eatenFood.effect);
                }
                
                foods.splice(eatenIndex, 1);
                spawnFoods();
                updateLevel();
            } else {
                snake.pop();
            }
            
            updateLength();
            
            updateEffects();
        }

        function getRandomFoodType() {
            const rand = Math.random();
            let cumulative = 0;
            for (const foodType of foodTypes) {
                cumulative += foodType.probability;
                if (rand < cumulative) {
                    return foodType;
                }
            }
            return foodTypes[0];
        }
        
        // 中心偏向随机：[0,1) 范围，峰值在中间，降低边缘概率
        function centerRandom() {
            return (Math.random() + Math.random()) / 2;
        }

        function spawnFoods() {
            const targetFoodCount = Math.min(3 + Math.floor(score / 100), 6);
            const head = snake[0];

            while (foods.length < targetFoodCount) {
                const foodType = getRandomFoodType();
                let newFood;
                let attempts = 0;
                do {
                    newFood = {
                        x: Math.floor(centerRandom() * tileCount),
                        y: Math.floor(centerRandom() * tileCount),
                        ...foodType
                    };
                    attempts++;
                } while (
                    attempts < 200 &&
                    (snake.some(s => s.x === newFood.x && s.y === newFood.y) ||
                     foods.some(f => f.x === newFood.x && f.y === newFood.y) ||
                     (Math.abs(newFood.x - head.x) < 4 && Math.abs(newFood.y - head.y) < 4) ||
                     foods.some(f => Math.abs(f.x - newFood.x) < 3 && Math.abs(f.y - newFood.y) < 3))
                );

                if (attempts < 200) {
                    foods.push(newFood);
                }
            }
        }

        function showEffectNotification(effectType) {
            const notifications = {
                speed: { text: '⚡ 加速！速度提升', color: 'linear-gradient(135deg, #ffd700, #ff8c00)' },
                slow: { text: '❄ 减速！速度降低', color: 'linear-gradient(135deg, #87ceeb, #4169e1)' },
                double: { text: '×2 双倍分数！', color: 'linear-gradient(135deg, #ff69b4, #ff1493)' },
                ghost: { text: '👻 幽灵模式！可穿墙', color: 'linear-gradient(135deg, #d3d3d3, #a9a9a9)' },
                shield: { text: '🛡 护盾激活！抵挡一次伤害', color: 'linear-gradient(135deg, #90ee90, #228b22)' }
            };
            
            const notification = notifications[effectType];
            if (!notification) return;
            
            const div = document.createElement('div');
            div.className = 'effect-notification';
            div.textContent = notification.text;
            div.style.background = notification.color;
            div.style.boxShadow = `0 0 30px ${notification.color.split(',')[0].replace('linear-gradient(135deg, ', '')}`;
            
            document.querySelector('.game-area').appendChild(div);
            
            setTimeout(() => div.remove(), 1500);
        }
        
        function applyEffect(effectType) {
            switch (effectType) {
                case 'speed':
                    activeEffects.speed.active = true;
                    activeEffects.speed.duration = activeEffects.speed.maxDuration;
                    activeEffects.slow.active = false;
                    recalculateSpeed();
                    showEffectNotification('speed');
                    break;
                case 'slow':
                    activeEffects.slow.active = true;
                    activeEffects.slow.duration = activeEffects.slow.maxDuration;
                    activeEffects.speed.active = false;
                    recalculateSpeed();
                    showEffectNotification('slow');
                    break;
                case 'double':
                    activeEffects.double.active = true;
                    activeEffects.double.duration = activeEffects.double.maxDuration;
                    showEffectNotification('double');
                    break;
                case 'ghost':
                    activeEffects.ghost.active = true;
                    activeEffects.ghost.duration = activeEffects.ghost.maxDuration;
                    showEffectNotification('ghost');
                    break;
                case 'shield':
                    activeEffects.shield.active = true;
                    activeEffects.shield.duration = activeEffects.shield.maxDuration;
                    showEffectNotification('shield');
                    break;
            }
        }
        
        function updateEffects() {
            const effectDuration = currentSpeed;
            
            for (const effect of Object.values(activeEffects)) {
                if (effect.active) {
                    effect.duration -= effectDuration;
                    if (effect.duration <= 0) {
                        effect.active = false;
                        effect.duration = 0;
                    }
                }
            }
            
            recalculateSpeed();
        }
        
        function recalculateSpeed() {
            currentSpeed = baseSpeed;

            if (activeEffects.burst.active) {
                currentSpeed = Math.max(25, baseSpeed * 0.35);
            } else if (activeEffects.speed.active) {
                currentSpeed = Math.max(30, baseSpeed * 0.6);
            } else if (activeEffects.slow.active) {
                currentSpeed = baseSpeed * 1.5;
            }

            if (isRunning && !isPaused) {
                clearInterval(gameLoop);
                gameLoop = setInterval(gameLoopFn, currentSpeed);
            }
        }

        function checkBurst() {
            if (!isRunning) return;
            keyPressTimestamps.push(Date.now());
            keyPressTimestamps = keyPressTimestamps.filter(t => Date.now() - t < 600);

            if (keyPressTimestamps.length >= 3 && !activeEffects.burst.active) {
                activeEffects.burst.active = true;
                activeEffects.burst.duration = activeEffects.burst.maxDuration;
                recalculateSpeed();
            }
        }

        function updateScore() {
            animateNumber('topScore', score);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore.toString());
            }
        }

        function animateNumber(elId, target) {
            const el = document.getElementById(elId);
            const current = parseInt(el.textContent) || 0;
            if (target === current) return;
            const diff = target - current;
            const steps = Math.min(Math.abs(diff), 20);
            const stepVal = diff / steps;
            let count = 0;
            if (window.__scoreAnim) cancelAnimationFrame(window.__scoreAnim);
            function step() {
                count++;
                const val = Math.round(current + stepVal * count);
                el.textContent = val;
                if (count < steps) {
                    window.__scoreAnim = requestAnimationFrame(step);
                } else {
                    el.textContent = target;
                }
            }
            step();
        }

        function updateLength() {
            document.getElementById('topLength').textContent = snake.length;
        }

        function updateLevel() {
            const level = Math.floor(score / 50) + 1;
            document.getElementById('topLevel').textContent = level;
            baseSpeed = Math.max(50, 150 - level * 10);
            recalculateSpeed();
        }

        function gameLoopFn() {
            move();
        }

        function renderLoop() {
            draw();
            requestAnimationFrame(renderLoop);
        }
        renderLoop();

        function beginGame() {
            lives = 3;
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            score = 0;
            isPaused = false;
            foods = [];
            snakeTrail = [];
            baseSpeed = currentMode === 'survival' ? 120 : 100;
            currentSpeed = baseSpeed;

            for (const effect of Object.values(activeEffects)) {
                effect.active = false;
                effect.duration = 0;
            }

            keyPressTimestamps = [];

            if (currentMode === 'timed') {
                timeRemaining = 60;
                document.getElementById('timeValue').textContent = timeRemaining;
                document.getElementById('timeDisplay').style.display = 'block';
            } else {
                document.getElementById('timeDisplay').style.display = 'none';
            }

            spawnFoods();
            updateScore();
            updateLength();
            document.getElementById('topLevel').textContent = '1';

            isRunning = true;
            document.getElementById('gameOverOverlay').classList.remove('show');

            particles = [];

            playStartSound();
            gameLoop = setInterval(gameLoopFn, currentSpeed);

            if (currentMode === 'timed') {
                timeLoop = setInterval(updateTime, 1000);
            }
        }

        function startGame() {
            initAudio();
            if (isRunning && !isPaused) return;

            if (isPaused) {
                isPaused = false;
                document.getElementById('pauseOverlay').classList.add('hidden');
                gameLoop = setInterval(gameLoopFn, currentSpeed);
                if (currentMode === 'timed') {
                    timeLoop = setInterval(updateTime, 1000);
                }
                return;
            }
            startCountdown();
        }

        function startCountdown() {
            const overlay = document.getElementById('countdownOverlay');
            const text = document.getElementById('countdownText');
            const steps = ['3', '2', '1', 'GO!'];
            let i = 0;

            overlay.classList.remove('hidden');

            function showNext() {
                if (i >= steps.length) {
                    overlay.classList.add('hidden');
                    beginGame();
                    return;
                }
                text.textContent = steps[i];
                text.className = 'countdown-number';
                if (steps[i] === 'GO!') {
                    text.classList.add('countdown-go');
                }
                // 重新触发动画
                text.style.animation = 'none';
                void text.offsetHeight;
                text.style.animation = '';
                i++;
                setTimeout(showNext, steps[i - 1] === 'GO!' ? 500 : 800);
            }
            showNext();
        }
        
        function updateTime() {
            timeRemaining--;
            document.getElementById('timeValue').textContent = timeRemaining;
            
            if (timeRemaining <= 0) {
                gameOver();
            }
        }
        
        function setGameMode(mode) {
            if (isRunning) {
                document.getElementById('gameOverOverlay').classList.remove('show');
                clearInterval(gameLoop);
                clearInterval(timeLoop);
            }
            
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
            
            const modeIntroData = {
                classic: { 
                    icon: '🎮', 
                    title: '经典模式', 
                    rules: ['🎯 吃食物得分', '👻 穿墙不死', '💀 碰到自己身体游戏结束']
                },
                timed: { 
                    icon: '⏱️', 
                    title: '限时模式', 
                    rules: ['⏱️ 60秒内尽可能获得高分', '🎯 吃食物得分', '👻 穿墙不死']
                },
                survival: { 
                    icon: '💀', 
                    title: '生存模式', 
                    rules: ['⚡ 初始速度更快', '🎯 吃食物得分', '👻 穿墙不死', '💀 碰到自己身体游戏结束']
                }
            };
            
            const data = modeIntroData[mode];
            document.getElementById('modeIntroIcon').textContent = data.icon;
            document.getElementById('modeIntroTitle').textContent = data.title;
            
            const rulesList = document.getElementById('modeIntroRules');
            rulesList.innerHTML = data.rules.map(rule => `<li>${rule}</li>`).join('');
            
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            score = 0;
            foods = [];
            baseSpeed = mode === 'survival' ? 120 : 100;
            currentSpeed = baseSpeed;
            
            for (const effect of Object.values(activeEffects)) {
                effect.active = false;
                effect.duration = 0;
            }

            keyPressTimestamps = [];

            if (mode === 'timed') {
                timeRemaining = 60;
                document.getElementById('timeValue').textContent = timeRemaining;
                document.getElementById('timeDisplay').style.display = 'block';
            } else {
                document.getElementById('timeDisplay').style.display = 'none';
            }
            
            updateScore();
            updateLength();
            document.getElementById('topLevel').textContent = '1';
            
            isRunning = false;
            isPaused = false;

            particles = [];

            document.getElementById('modeIntroOverlay').classList.remove('hidden');
            document.getElementById('pauseOverlay').classList.add('hidden');
            draw();
        }

        function pauseGame() {
            if (!isRunning || isPaused) return;
            
            isPaused = true;
            clearInterval(gameLoop);
            clearInterval(timeLoop);
            document.getElementById('pauseOverlay').classList.remove('hidden');
        }
        
        function resumeGame() {
            if (!isPaused) return;
            
            isPaused = false;
            document.getElementById('pauseOverlay').classList.add('hidden');
            gameLoop = setInterval(gameLoopFn, currentSpeed);
            if (currentMode === 'timed') {
                timeLoop = setInterval(updateTime, 1000);
            }
        }

        function gameOver() {
            clearInterval(gameLoop);
            clearInterval(timeLoop);
            isRunning = false;

            createGameOverParticles();
            playGameOverSound();

            // 屏幕震动
            const container = document.querySelector('.game-area');
            container.classList.remove('shake');
            void container.offsetHeight;
            container.classList.add('shake');
            setTimeout(() => container.classList.remove('shake'), 500);

            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScore').textContent = highScore;

            // 复活逻辑
            const reviveBtn = document.getElementById('reviveBtn');
            const livesDisplay = document.getElementById('livesDisplay');
            if (lives > 0) {
                lives--;
                document.getElementById('livesCount').textContent = lives;
                livesDisplay.style.display = '';
                reviveBtn.style.display = '';
            } else {
                livesDisplay.style.display = 'none';
                reviveBtn.style.display = 'none';
            }

            document.getElementById('gameOverOverlay').classList.add('show');
            document.getElementById('pauseOverlay').classList.add('hidden');
        }

        function reviveGame() {
            document.getElementById('gameOverOverlay').classList.remove('show');
            initAudio();

            // 保持 score / length / level，重置蛇位置
            const len = snake.length;
            const startY = Math.floor(tileCount / 2);
            const startX = Math.floor(tileCount * 0.4);
            snake = [];
            for (let i = 0; i < len; i++) {
                snake.push({ x: ((startX - i) % tileCount + tileCount) % tileCount, y: startY });
            }
            dx = 1;
            dy = 0;
            isPaused = false;

            // 移除与蛇重叠的食物
            foods = foods.filter(f => !snake.some(s => s.x === f.x && s.y === f.y));

            for (const effect of Object.values(activeEffects)) {
                effect.active = false;
                effect.duration = 0;
            }

            keyPressTimestamps = [];
            snakeTrail = [];
            particles = [];

            playStartSound();
            recalculateSpeed();
            spawnFoods();

            isRunning = true;
            gameLoop = setInterval(gameLoopFn, currentSpeed);
            if (currentMode === 'timed') {
                timeLoop = setInterval(updateTime, 1000);
            }
        }

        function restartGame() {
            document.getElementById('gameOverOverlay').classList.remove('show');
            startGame();
        }

        function handleKeyDown(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                
                const modeOverlay = document.getElementById('modeIntroOverlay');
                if (!modeOverlay.classList.contains('hidden')) {
                    document.getElementById('modeIntroBtn').click();
                    return;
                }
                
                const pauseOverlay = document.getElementById('pauseOverlay');
                if (isPaused && !pauseOverlay.classList.contains('hidden')) {
                    resumeGame();
                    return;
                }
                
                if (isRunning && !isPaused) {
                    pauseGame();
                }
                return;
            }
            
            switch (e.code) {
                case 'ArrowUp':
                case 'ArrowDown':
                case 'ArrowLeft':
                case 'ArrowRight':
                    e.preventDefault();
                    break;
            }
            
            switch (e.code) {
                case 'ArrowUp':
                case 'KeyW':
                    if (dy !== 1) {
                        dx = 0;
                        dy = -1;
                        checkBurst();
                    }
                    break;
                case 'ArrowDown':
                case 'KeyS':
                    if (dy !== -1) {
                        dx = 0;
                        dy = 1;
                        checkBurst();
                    }
                    break;
                case 'ArrowLeft':
                case 'KeyA':
                    if (dx !== 1) {
                        dx = -1;
                        dy = 0;
                        checkBurst();
                    }
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    if (dx !== -1) {
                        dx = 1;
                        dy = 0;
                        checkBurst();
                    }
                    break;
                case 'Space':
                    e.preventDefault();
                    pauseGame();
                    break;
            }
        }

        document.getElementById('resumeBtn').addEventListener('click', resumeGame);
        
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => setGameMode(btn.dataset.mode));
        });
        
        document.getElementById('modeIntroBtn').addEventListener('click', () => {
            initAudio();
            document.getElementById('modeIntroOverlay').classList.add('hidden');
            startCountdown();
        });
        
        document.getElementById('speedRange').addEventListener('input', (e) => {
            const value = parseInt(e.target.value);
            baseSpeed = value;
            recalculateSpeed();
            document.getElementById('speedValue').textContent = (value / 100).toFixed(1) + 'x';
        });
        
        document.getElementById('speedValue').textContent = (baseSpeed / 100).toFixed(1) + 'x';
        
        document.getElementById('highScore').textContent = highScore;
        
        document.addEventListener('keydown', handleKeyDown);
        
        document.getElementById('topScore').textContent = '0';
        document.getElementById('topLength').textContent = '3';
        document.getElementById('topLevel').textContent = '1';
        
        spawnFoods();
        draw();

        // ===== 全屏背景粒子系统 =====
        const bgCanvas = document.getElementById('bgCanvas');
        const bgCtx = bgCanvas.getContext('2d');

        function resizeBgCanvas() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeBgCanvas);
        resizeBgCanvas();

        class BgParticle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * bgCanvas.width;
                this.y = Math.random() * bgCanvas.height;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.5 + 0.15;
                this.color = ['#00ff88', '#00d4ff', '#b44dff', '#ff2d95', '#ffd700'][Math.floor(Math.random() * 5)];
                this.pulse = Math.random() * Math.PI * 2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.pulse += 0.02;
                if (this.x < 0 || this.x > bgCanvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > bgCanvas.height) this.speedY *= -1;
            }
            draw() {
                const o = this.opacity * (0.7 + 0.3 * Math.sin(this.pulse));
                bgCtx.fillStyle = this.color;
                bgCtx.globalAlpha = o;
                bgCtx.shadowColor = this.color;
                bgCtx.shadowBlur = this.size * 6;
                bgCtx.beginPath();
                bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.shadowBlur = 0;
            }
        }

        function initBgParticles() {
            bgParticles = [];
            for (let i = 0; i < BG_PARTICLE_COUNT; i++) {
                bgParticles.push(new BgParticle());
            }
        }

        function drawBgParticles() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgParticles.forEach(p => { p.update(); p.draw(); });
            // 粒子连线效果（近距离时）
            for (let i = 0; i < bgParticles.length; i++) {
                for (let j = i + 1; j < bgParticles.length; j++) {
                    const dx = bgParticles[i].x - bgParticles[j].x;
                    const dy = bgParticles[i].y - bgParticles[j].y;
                    const dist = dx * dx + dy * dy;
                    if (dist < 180 * 180) {
                        bgCtx.beginPath();
                        bgCtx.moveTo(bgParticles[i].x, bgParticles[i].y);
                        bgCtx.lineTo(bgParticles[j].x, bgParticles[j].y);
                        bgCtx.strokeStyle = `rgba(0, 255, 136, ${0.06 * (1 - dist / (180 * 180))})`;
                        bgCtx.lineWidth = 0.5;
                        bgCtx.stroke();
                    }
                }
            }
            requestAnimationFrame(drawBgParticles);
        }

        initBgParticles();
        drawBgParticles();

        // ===== 按钮涟漪效果 =====
        function initRippleEffect() {
            document.querySelectorAll('.btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const rect = this.getBoundingClientRect();
                    const ripple = document.createElement('span');
                    ripple.className = 'ripple';
                    const size = Math.max(rect.width, rect.height);
                    ripple.style.width = ripple.style.height = size + 'px';
                    ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                    ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                    this.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 600);
                });
            });
        }
        initRippleEffect();
    </script>
</body>
</html>
